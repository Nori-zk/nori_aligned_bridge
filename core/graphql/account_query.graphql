query AccountQuery($stateHash: String!, $accountInfos: [AccountInput!]!) {
  encodedSnarkedLedgerAccountMembership(stateHash: $stateHash, accountInfos: $accountInfos) {
    account
    merklePath {
      left
      right
    }
  }
    block(stateHash: $stateHash) {
      protocolState {
          blockchainState {
              snarkedLedgerHash
          }
      }
  }
}