query AccountQuery($stateHash: String!, $publicKey: String!, $tokenId: String!) {
    encodedSnarkedLedgerAccountMembership(accountInfos: {publicKey: $publicKey, token: $tokenId}, stateHash: $stateHash) {
        account
        merklePath {
          left
          right
        }
      }
    block(stateHash: $stateHash) {
        protocolState {
            blockchainState {
                snarkedLedgerHash
            }
        }
    }
}
